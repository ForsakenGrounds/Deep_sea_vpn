<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea VPN</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }

        body {
            /* Исправленное отображение фона */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('sankt-peteburg_-_panoramio_1.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Фиксируем фон для плавности на ПК */
            background-repeat: no-repeat;
            color: white;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.3); /* Чуть темнее для контраста */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 20px;
            max-width: 450px;
            width: 85%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 25px 0;
            font-weight: 700;
        }

        .features {
            text-align: left;
            display: inline-block;
            margin-bottom: 30px;
        }

        .feature-item {
            font-size: 1.1rem;
            margin: 12px 0;
            display: flex;
            align-items: center;
            line-height: 1.4;
        }

        /* Круглые точки вместо галочек */
        .feature-item::before {
            content: "";
            width: 8px;
            height: 8px;
            background-color: #00d4ff;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0; /* Чтобы точка не сплющивалась */
        }

        .price {
            font-size: 1.3rem;
            font-weight: bold;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 25px;
            border-radius: 50px;
            display: inline-block;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.95rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Deep Sea VPN</h1>
        
        <div class="features">
            <div class="feature-item">Выделенный сервер</div>
            <div class="feature-item">Для всех устройств (iOS, Android, ПК)</div>
        </div>

        <div>
            <span class="price">100 рублей</span>
        </div>

        <p class="footer-text">Напишите в чат, чтобы получить доступ</p>
    </div>

    <script src="//code.jivo.ru/widget/RWs33dA1xC" async></script>

</body>
</html>
