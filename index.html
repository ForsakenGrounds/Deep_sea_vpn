<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea VPN</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }

        body {
            /* Используем твою картинку из GitHub */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('sankt-peteburg_-_panoramio_1.jpg'); 
            background-size: cover;
            background-position: center;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
        }

        .features {
            text-align: left;
            display: inline-block;
            margin-bottom: 25px;
        }

        .feature-item {
            font-size: 1.1rem;
            margin: 10px 0;
            display: flex;
            align-items: center;
        }

        .feature-item::before {
            content: "✓";
            color: #00d4ff;
            font-weight: bold;
            margin-right: 10px;
        }

        .price {
            font-size: 1.4rem;
            font-weight: bold;
            background: #00d4ff;
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Deep Sea VPN</h1>
        
        <div class="features">
            <div class="feature-item">Выделенный сервер</div>
            <div class="feature-item">Для всех устройств (iOS, Android, ПК)</div>
            <div class="feature-item">Стабильное соединение</div>
        </div>

        <div>
            <span class="price">Всего 100 рублей</span>
        </div>

        <p class="footer-text">Напишите в чат, чтобы получить доступ</p>
    </div>

    <!-- Виджет Jivochat -->
    <script src="//code.jivo.ru/widget/RWs33dA1xC" async></script>

</body>
</html>
